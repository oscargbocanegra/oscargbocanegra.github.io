<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <meta
      property="og:title"
      content="{{ page.title | default: site.title }}"
    />
    <meta
      property="og:description"
      content="{{ page.description | default: site.description }}"
    />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />
    <meta property="og:type" content="profile" />
    <meta
      property="og:site_name"
      content="{{ site.title | default: site.author }}"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="{{ '/favicon.svg' | relative_url }}"
    />
    <meta name="theme-color" content="#0066cc" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha384-3B6NwesSXE7YJlcLI9RpRqGf2p/EgVH8BgoKTaUrmKNDkHPStTQ3EyoYjCGXaOTS"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/css/resume.css' | relative_url }}" />
  </head>
  <body>
    {{ content }}

    <script>
      function toggleLanguage() {
        const isEN = document.body.classList.toggle("lang-en-active");
        const langToggle = document.getElementById("langToggle");
        const downloadText = document.getElementById("downloadText");
        langToggle.textContent = isEN ? "ES" : "EN";
        downloadText.textContent = isEN ? "Download CV" : "Descargar CV";
      }

      function downloadCV() {
        window.print();
      }
    </script>
  </body>
</html>
