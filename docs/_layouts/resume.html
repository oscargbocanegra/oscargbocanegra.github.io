<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/css/resume.css' | relative_url }}">
</head>
<body>
    {{ content }}

    <script>
        let currentLang = 'es';

        function toggleLanguage() {
            const langToggle = document.getElementById('langToggle');
            const esElements = document.querySelectorAll('.lang-es');
            const enElements = document.querySelectorAll('.lang-en');
            const downloadLink = document.getElementById('downloadLink');
            const downloadText = document.getElementById('downloadText');

            if (currentLang === 'es') {
                esElements.forEach(el => el.style.display = 'none');
                enElements.forEach(el => el.style.display = 'block');
                langToggle.textContent = 'ES';
                currentLang = 'en';
                downloadLink.href = 'cv-oscar-bocanegra-en.pdf';
                downloadLink.download = 'CV-Oscar-Giovanni-Bocanegra-EN.pdf';
                downloadText.textContent = 'Download CV';
            } else {
                esElements.forEach(el => el.style.display = 'block');
                enElements.forEach(el => el.style.display = 'none');
                langToggle.textContent = 'EN';
                currentLang = 'es';
                downloadLink.href = 'cv-oscar-bocanegra.pdf';
                downloadLink.download = 'CV-Oscar-Giovanni-Bocanegra-ES.pdf';
                downloadText.textContent = 'Descargar CV';
            }
        }
    </script>
</body>
</html>
